name: wine
build-options:
  append-path: /usr/lib/sdk/mingw-w64/bin
  env:
    CC: ccache gcc
    i386_CC: ccache i686-w64-mingw32-gcc
    x86_64_CC: ccache x86_64-w64-mingw32-gcc
config-opts:
  - --libdir=/app/lib
  - --enable-archs=i386,x86_64
  - --disable-winemenubuilder
  - --disable-tests
make-install-args:
  - LDCONFIG=/bin/true
  - UPDATE_DESKTOP_DATABASE=/bin/true
  - INSTALL_PROGRAM_FLAGS=-s
sources:
  - type: archive
    url: https://dl.winehq.org/wine/source/11.x/wine-11.5.tar.xz
    sha256: 11370b57ea5d548a54d92c9cd65d0ba635f4f1c3eadace09ed1c419f705e19d1

