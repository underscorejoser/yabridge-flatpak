id: io.github.robbert_vdh.yabridgectl
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
base: org.winehq.Wine
base-version: stable-25.08
command: yabridgectl

# Ugh
writable-sdk: true

# build-options:
#   env:
#     PLUGIN_DIR: 

add-extensions:
  org.freedesktop.LinuxAudio.Plugins.yabridge:
    version: "5.1.1"
    base: org.winehq.Wine
    directory: extensions/Plugins/yabridge
    add-ld-path: lib
    bundle: true
    no-autodownload: false
    autodelete: false

modules:
  - name: yabridge
    buildsystem: meson

    build-options:
      env:
        LIBRARY_PATH: $LIBRARY_PATH:/app/lib
        SEARCH_DIR: /app/lib

    config-opts:
      - --buildtype=release
      - --cross-file=../cross-wine.conf

    post-install:
      - mkdir -p ${FLATPAK_DEST}/extensions/Plugins/yabridge
    
    sources:
      - type: git
        url: https://github.com/robbert-vdh/yabridge.git
        commit: 945528cd7f898d717d772b93f939343dad122d91
        # hash:
    modules:
      - name: asio
        buildsystem: autotools
        build-options:
          prefix: /usr
        sources:
          - type: git
            url: https://github.com/chriskohlhoff/asio.git
            tag: "asio-1-38-0"
      - name: bitsery
        buildsystem: cmake
        build-options:
          prefix: /usr
        sources:
          - type: git
            url: https://github.com/fraillt/bitsery.git
            tag: "v5.2.5"
      - name: function2
        buildsystem: cmake
        build-options:
          prefix: /usr
        sources:
          - type: git
            url: https://github.com/Naios/function2.git
            tag: "4.2.5"
      - name: filesystem
        buildsystem: cmake
        build-options:
          prefix: /usr
        sources:
          - type: git
            url: https://github.com/gulrak/filesystem.git
            tag: "v1.5.14"
      - name: tomlplusplus
        buildsystem: meson
        build-options:
          prefix: /usr
        sources:
          - type: git
            url: https://github.com/marzer/tomlplusplus.git
            tag: "v3.4.0"
      - name: vst3sdk
        buildsystem: meson
        build-options:
          prefix: /usr
        sources:
          - type: git
            url: https://github.com/robbert-vdh/vst3sdk.git
            tag: "v3.7.7_build_19-patched"
      - name: clap
        buildsystem: cmake
        build-options:
          prefix: /usr
        sources:
          - type: git
            url: https://github.com/free-audio/clap.git
            tag: "1.1.9"

  # Apparently the best way to build an independent project of
  # a git repo is just referencing the source again in a
  # separate module.
  - name: yabridgectl
    buildsystem: simple # flatpak has no support for cargo yet
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin
      env:
        CARGO_HOME: /run/build/yabridgectl/cargo
        CARGO_NET_OFFLINE: 'true'
    subdir: tools/yabridgectl

    build-commands:
      - cargo --offline fetch --manifest-path Cargo.toml --verbose
      - cargo build --offline --release --all-features
      - install -Dm0755 target/release/yabridgectl ${FLATPAK_DEST}/bin/yabridgectl

    sources:
      - type: git
        url: https://github.com/robbert-vdh/yabridge.git
        commit: 945528cd7f898d717d772b93f939343dad122d91
        # hash: 
